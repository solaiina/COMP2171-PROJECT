<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Book Appointment</title>
    <link rel="stylesheet" href="style.css">
    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background: #f4f4f4;
            padding: 40px 20px;
        }

        .page-box {
            max-width: 800px;
            margin: auto;
            background: white;
            padding: 30px;
            border-radius: 16px;
            box-shadow: 0 0 20px rgba(0,0,0,0.1);
        }

        .page-box h1 {
            color: #162938;
            margin-bottom: 20px;
        }

        .top-actions {
            display: flex;
            justify-content: space-between;
            margin-bottom: 20px;
            flex-wrap: wrap;
            gap: 10px;
        }

        .top-actions a {
            text-decoration: none;
            background: #162938;
            color: white;
            padding: 10px 16px;
            border-radius: 8px;
        }

        .booking-form {
            display: grid;
            gap: 15px;
        }

        .booking-form label {
            font-weight: 600;
            color: #162938;
        }

        .booking-form input,
        .booking-form select,
        .booking-form button {
            padding: 12px;
            font-size: 15px;
            border-radius: 8px;
        }

        .booking-form input,
        .booking-form select {
            border: 1px solid #ccc;
        }

        .booking-form button {
            border: none;
            background: #162938;
            color: white;
            cursor: pointer;
        }

        .service-info {
            background: #f8f8f8;
            border-left: 4px solid #162938;
            padding: 12px;
            border-radius: 8px;
            color: #162938;
        }
    </style>
</head>
<body>
    <div class="page-box">
        <div class="top-actions">
            <a href="../index.html">← Back to Login</a>
            <a href="view-appointments.html">Provider Calendar</a>
        </div>

        <h1>Book Appointment</h1>

        <form class="booking-form" id="bookingForm">
            <div>
                <label for="clientName">Client Name</label>
                <input type="text" id="clientName" placeholder="Enter your name">
            </div>

            <div>
                <label for="appointmentDate">Appointment Date</label>
                <input type="date" id="appointmentDate">
            </div>

            <div>
                <label for="appointmentTime">Appointment Time</label>
                <input type="time" id="appointmentTime">
            </div>

            <div>
                <label for="serviceSelect">Select Service</label>
                <select id="serviceSelect">
                    <option value="">Choose a service</option>
                </select>
            </div>

            <div class="service-info" id="serviceInfo">
                Select a service to view its duration and price.
            </div>

            <button type="submit">Book Appointment</button>
        </form>
    </div>

    <script src="book-appointment.js"></script>
</body>
</html>
