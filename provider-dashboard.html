<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Provider Dashboard</title>
    <link rel="stylesheet" href="../css/style.css">
    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background: #f4f4f4;
            padding: 40px;
        }

        .dashboard-box {
            max-width: 700px;
            margin: auto;
            background: white;
            padding: 30px;
            border-radius: 16px;
            box-shadow: 0 0 20px rgba(0,0,0,0.1);
        }

        .dashboard-box h1 {
            margin-bottom: 20px;
            color: #162938;
        }

        .dashboard-actions {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
        }

        .dashboard-actions a {
            display: inline-block;
            background: #162938;
            color: white;
            text-decoration: none;
            padding: 14px 20px;
            border-radius: 8px;
        }
    </style>
</head>
<body>
    <div class="dashboard-box">
        <h1>Service Provider Dashboard</h1>
        <div class="dashboard-actions">
            <a href="manage-services.html">Manage Services</a>
            <a href="view-appointments.html">View Appointments</a>
            <a href="book-appointment.html">Test Booking Page</a>
        </div>
    </div>
</body>
</html>
