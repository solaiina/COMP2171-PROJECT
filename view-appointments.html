<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>View Appointments</title>
    <link rel="stylesheet" href="style.css">
    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background: #f4f4f4;
            padding: 40px 20px;
        }

        .page-box {
            max-width: 1000px;
            margin: auto;
            background: white;
            padding: 30px;
            border-radius: 16px;
            box-shadow: 0 0 20px rgba(0,0,0,0.1);
        }

        .page-box h1, .page-box h2 {
            color: #162938;
            margin-bottom: 20px;
        }

        .top-actions {
            display: flex;
            justify-content: space-between;
            margin-bottom: 20px;
            flex-wrap: wrap;
            gap: 10px;
        }

        .top-actions a {
            text-decoration: none;
            background: #162938;
            color: white;
            padding: 10px 16px;
            border-radius: 8px;
        }

        .calendar-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 18px;
        }

        .calendar-header button {
            background: #162938;
            color: white;
            border: none;
            padding: 10px 14px;
            border-radius: 8px;
            cursor: pointer;
        }

        .calendar-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 10px;
        }

        .calendar-day-name,
        .calendar-day {
            text-align: center;
            padding: 14px 8px;
            border-radius: 10px;
        }

        .calendar-day-name {
            font-weight: bold;
            background: #e9eef2;
            color: #162938;
        }

        .calendar-day {
            min-height: 72px;
            background: #f8f8f8;
            border: 1px solid #ddd;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .calendar-day.empty {
            background: transparent;
            border: none;
            cursor: default;
        }

        .calendar-day.free {
            background: #e8f5e9;
            color: #1b5e20;
            font-weight: 600;
        }

        .calendar-day.booked {
            background: #ffd6d6;
            color: #8b0000;
            font-weight: 700;
        }

        .calendar-day.selected {
            outline: 3px solid #162938;
        }

        .appointments-list {
            margin-top: 25px;
            padding: 20px;
            border-radius: 12px;
            background: #f8f8f8;
        }

        .appointment-card {
            background: white;
            border-left: 5px solid #162938;
            padding: 14px;
            margin-bottom: 12px;
            border-radius: 8px;
        }

        .appointment-card h3 {
            margin-bottom: 8px;
            color: #162938;
        }

        .empty-text {
            color: #666;
        }

        @media (max-width: 700px) {
            .calendar-grid {
                gap: 6px;
            }

            .calendar-day {
                min-height: 56px;
                font-size: 14px;
                padding: 10px 4px;
            }
        }
    </style>
</head>
<body>
    <div class="page-box">
        <div class="top-actions">
            <a href="provider-dashboard.html">← Back to Dashboard</a>
            <a href="manage-services.html">Manage Services</a>
        </div>

        <h1>View Appointments</h1>

        <div class="calendar-header">
            <button onclick="changeMonth(-1)">Previous</button>
            <h2 id="monthTitle"></h2>
            <button onclick="changeMonth(1)">Next</button>
        </div>

        <div class="calendar-grid" id="calendarGrid"></div>

        <div class="appointments-list">
            <h2 id="selectedDateTitle">Appointments</h2>
            <div id="appointmentsContainer">
                <p class="empty-text">Click a day to view appointments.</p>
            </div>
        </div>
    </div>

    <script src="view-appointments.js"></script>
</body>
</html>
